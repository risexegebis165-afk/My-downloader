<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Video Downloader</title>
    <style>
        :root {
            --primary: #6366f1;
            --dark: #1e1b4b;
            --light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h2 { color: var(--dark); margin-bottom: 1.5rem; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #result {
            margin-top: 20px;
            display: none;
        }

        .success-link {
            display: inline-block;
            background: #22c55e;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
        }

        .error { color: #ef4444; background: #fee2e2; padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Downloader ⚡</h2>
    
    <input type="text" id="videoUrl" placeholder="ভিডিও লিঙ্ক এখানে দিন (YT, Shorts, FB)...">
    
    <select id="quality">
        <option value="720">720p (HD)</option>
        <option value="1080">1080p (Full HD)</option>
        <option value="480">480p (SD)</option>
        <option value="max">Best Available</option>
    </select>

    <button id="downloadBtn" onclick="downloadProcess()">ডাউনলোড লিঙ্ক জেনারেট করুন</button>

    <div id="loader"></div>
    <div id="result"></div>
</div>

<script>
    async function downloadProcess() {
        const urlInput = document.getElementById('videoUrl').value;
        const quality = document.getElementById('quality').value;
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('downloadBtn');

        if (!urlInput) {
            alert("দয়া করে একটি লিঙ্ক দিন!");
            return;
        }

        // UI Reset
        resultDiv.style.display = "none";
        loader.style.display = "block";
        btn.disabled = true;
        btn.style.opacity = "0.5";

        // Cobalt API Endpoints (একাধিক এন্ডপয়েন্ট ট্রাই করবে)
        const apiEndpoints = [
            'https://api.cobalt.tools/api/json',
            'https://cobalt-api.v0.sh/api/json'
        ];

        let success = false;

        for (let api of apiEndpoints) {
            try {
                const response = await fetch(api, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: urlInput,
                        videoQuality: quality,
                        filenameStyle: "pretty"
                    })
                });

                const data = await response.json();

                if (data.url || data.status === "stream") {
                    loader.style.display = "none";
                    resultDiv.style.display = "block";
                    resultDiv.innerHTML = `
                        <p style="color: green; font-weight:bold;">ভিডিওটি ডাউনলোডের জন্য তৈরি!</p>
                        <a href="${data.url}" class="success-link" download target="_blank">Download Now</a>
                    `;
                    success = true;
                    break; 
                }
            } catch (err) {
                console.log("Trying next API...");
            }
        }

        if (!success) {
            loader.style.display = "none";
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `<div class="error">সার্ভার এই মুহূর্তে কাজ করছে না। অন্য একটি ভিডিও লিঙ্ক দিয়ে ট্রাই করুন।</div>`;
        }

        btn.disabled = false;
        btn.style.opacity = "1";
    }
</script>

</body>
</html>
