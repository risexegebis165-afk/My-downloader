<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Video Downloader</title>
    <style>
        :root {
            --primary: #6366f1;
            --dark: #1e1b4b;
            --light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h2 { color: var(--dark); margin-bottom: 1.5rem; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); }

        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover { background-color: #4f46e5; transform: translateY(-2px); }

        #loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .success-link {
            display: inline-block;
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .error { color: #ef4444; background: #fee2e2; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Downloader ⚡</h2>
    
    <input type="text" id="videoUrl" placeholder="YouTube ভিডিও লিঙ্ক এখানে দিন...">
    
    <select id="quality">
        <option value="720">720p (HD)</option>
        <option value="1080">1080p (Full HD)</option>
        <option value="480">480p (SD)</option>
        <option value="max">Best Quality</option>
    </select>

    <button onclick="downloadProcess()">ডাউনলোড লিঙ্ক জেনারেট করুন</button>

    <div id="loader"></div>
    <div id="result"></div>
</div>

<script>
    async function downloadProcess() {
        const url = document.getElementById('videoUrl').value;
        const quality = document.getElementById('quality').value;
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if (!url) {
            alert("দয়া করে একটি লিঙ্ক দিন!");
            return;
        }

        // Reset UI
        resultDiv.style.display = "none";
        loader.style.display = "block";

        try {
            const response = await fetch('https://api.cobalt.tools/api/json', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    url: url,
                    videoQuality: quality,
                    filenameStyle: "pretty"
                })
            });

            const data = await response.json();
            loader.style.display = "none";
            resultDiv.style.display = "block";

            if (data.status === "stream" || data.status === "redirect" || data.url) {
                resultDiv.innerHTML = `
                    <p style="color: green; margin-bottom:10px;">ভিডিও তৈরি!</p>
                    <a href="${data.url}" class="success-link" target="_blank">ডাউনলোড শুরু করুন</a>
                `;
            } else {
                resultDiv.innerHTML = `<div class="error">দুঃখিত! লিঙ্কটি কাজ করছে না। আবার চেষ্টা করুন।</div>`;
            }

        } catch (error) {
            loader.style.display = "none";
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `<div class="error">API কানেকশন এরর! ইন্টারনেট চেক করুন।</div>`;
        }
    }
</script>

</body>
  </html>
